<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Budget" />
<meta name="theme-color" content="#152838" />
<title>Budget Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #152838;
    --surface: #1c3448;
    --surface2: #102030;
    --surface3: #1f3d52;
    --border: rgba(0,230,200,0.18);
    --border2: rgba(0,230,200,0.32);
    --border3: rgba(0,230,200,0.5);
    --text: #eefaf8;
    --text2: #a8ddd8;
    --text3: #6aacb4;
    --cyan: #00f0d4;
    --cyan-dim: rgba(0,240,212,0.12);
    --green: #5dff90;
    --green-dim: rgba(93,255,144,0.12);
    --red: #ff6278;
    --red-dim: rgba(255,98,120,0.12);
    --purple: #c47fff;
    --purple-dim: rgba(196,127,255,0.12);
    --purple-border: rgba(196,127,255,0.38);
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --mono: 'Share Tech Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }

  /* ── Nav ── */
  .nav { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border2); flex-shrink: 0; padding-top: env(safe-area-inset-top, 0px); }
  .nav-btn { flex: 1; padding: 13px 8px; text-align: center; font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
  .nav-btn.active-ledger { color: var(--cyan); border-bottom-color: var(--cyan); }
  .nav-btn.active-plan { color: var(--purple); border-bottom-color: var(--purple); }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── Balance header ── */
  .balance-header { padding: 16px 20px 18px; background: var(--surface); border-bottom: 1px solid var(--border2); flex-shrink: 0; text-align: center; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-label { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; }
  .reset-btn { font-family: var(--mono); font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; }
  .reset-btn:active { color: var(--red); border-color: var(--red); }
  .balance-amount { font-family: var(--mono); font-size: 50px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; transition: color 0.2s; }
  .balance-amount.pos { color: var(--cyan); text-shadow: 0 0 20px rgba(0,230,200,0.3); }
  .balance-amount.neg { color: var(--red); text-shadow: 0 0 20px rgba(255,79,106,0.3); }
  .balance-amount.zero { color: var(--text3); }
  .balance-sub { font-family: var(--mono); font-size: 12px; color: var(--text3); letter-spacing: 0.04em; }
  .plan-after { font-family: var(--mono); font-size: 13px; margin-top: 10px; padding: 7px 16px; border-radius: var(--radius-sm); display: inline-block; letter-spacing: 0.04em; }
  .plan-after.pos { background: var(--green-dim); color: var(--green); border: 1px solid rgba(57,255,122,0.25); }
  .plan-after.neg { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,79,106,0.25); }

  /* ── Add panel ── */
  .add-panel { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 12px 16px; flex-shrink: 0; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .type-btn { padding: 8px; border-radius: var(--radius-sm); font-size: 12px; font-family: var(--mono); cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text3); text-align: center; transition: all 0.15s; letter-spacing: 0.06em; text-transform: uppercase; }
  .type-btn.active-deposit { background: var(--green-dim); border-color: rgba(57,255,122,0.35); color: var(--green); }
  .type-btn.active-expense { background: var(--red-dim); border-color: rgba(255,79,106,0.3); color: var(--red); }
  .type-btn.active-plan { background: var(--purple-dim); border-color: var(--purple-border); color: var(--purple); }
  .input-row { display: flex; gap: 8px; align-items: stretch; }
  .input-row input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; font-family: var(--sans); color: var(--text); outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
  .input-row input[type=text]:focus { border-color: var(--cyan); }
  .input-row input[type=text]::placeholder { color: var(--text3); }
  .amt-wrap { position: relative; }
  .amt-wrap span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 14px; color: var(--text3); pointer-events: none; }
  .amt-wrap input[type=number] { width: 100px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 10px 10px 22px; font-size: 14px; font-family: var(--mono); color: var(--text); outline: none; -webkit-appearance: none; appearance: none; transition: border-color 0.15s; }
  .amt-wrap input[type=number]:focus { border-color: var(--cyan); }
  .add-btn { padding: 10px 16px; border-radius: var(--radius-sm); font-size: 20px; cursor: pointer; border: none; background: var(--cyan); color: var(--bg); flex-shrink: 0; transition: all 0.15s; line-height: 1; font-weight: 700; }
  .add-btn:active { transform: scale(0.94); }
  .add-btn.plan-mode { background: var(--purple); }

  /* ── Scroll list ── */
  .scroll-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 14px calc(var(--safe-bottom) + 16px); background: var(--bg); }
  .scroll-list::-webkit-scrollbar { width: 0; }
  .day-group { margin-top: 14px; }
  .day-label { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; padding: 0 2px; }

  /* ── Entries ── */
  .entry { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; transition: border-color 0.15s; }
  .entry:hover { border-color: var(--border2); }
  .entry.planned { border-style: dashed; border-color: var(--purple-border); background: var(--purple-dim); }
  .entry-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; font-family: var(--mono); }
  .icon-deposit { background: var(--green-dim); color: var(--green); border: 1px solid rgba(57,255,122,0.2); }
  .icon-expense { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,79,106,0.2); }
  .icon-plan { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple-border); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; letter-spacing: 0.04em; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amt { font-family: var(--mono); font-size: 15px; font-weight: 400; }
  .amt-deposit { color: var(--green); }
  .amt-expense { color: var(--red); }
  .amt-plan { color: var(--purple); }
  .entry-bal { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .entry-bal.neg { color: var(--red); }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
  .del-btn:active { color: var(--red); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); font-family: var(--mono); font-size: 13px; line-height: 2; letter-spacing: 0.04em; }

  .clear-plan-btn { font-family: var(--mono); font-size: 11px; color: var(--purple); background: var(--purple-dim); border: 1px solid var(--purple-border); border-radius: 6px; padding: 4px 10px; cursor: pointer; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div id="app">

  <div class="nav">
    <button class="nav-btn active-ledger" id="nav-ledger" onclick="switchScreen('ledger')">// Account</button>
    <button class="nav-btn" id="nav-plan" onclick="switchScreen('plan')">⬡ Plan</button>
  </div>

  <!-- LEDGER -->
  <div class="screen active" id="screen-ledger">
    <div class="balance-header">
      <div class="header-row">
        <span class="header-label">// balance</span>
        <button class="reset-btn" onclick="resetLedger()">reset</button>
      </div>
      <div class="balance-amount zero" id="ledgerBalance">$0.00</div>
      <div class="balance-sub" id="ledgerSub">no transactions yet</div>
    </div>

    <div class="add-panel">
      <div class="type-toggle">
        <div class="type-btn active-deposit" id="l-typeDeposit" onclick="setLedgerType('deposit')">▲ Deposit</div>
        <div class="type-btn" id="l-typeExpense" onclick="setLedgerType('expense')">▼ Expense</div>
      </div>
      <div class="input-row">
        <input type="text" id="l-name" placeholder="Description..." />
        <div class="amt-wrap"><span>$</span><input type="number" id="l-amt" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div>
        <button class="add-btn" id="l-addBtn" onclick="addLedgerEntry()">+</button>
      </div>
    </div>

    <div class="scroll-list" id="ledgerList"></div>
  </div>

  <!-- PLAN -->
  <div class="screen" id="screen-plan">
    <div class="balance-header">
      <div class="header-row">
        <span class="header-label">⬡ simulate</span>
        <button class="clear-plan-btn" onclick="clearPlan()">clear all</button>
      </div>
      <div class="balance-sub" style="margin-bottom:4px; letter-spacing:0.04em;">real balance</div>
      <div class="balance-amount pos" id="planRealBalance">$0.00</div>
      <div id="planAfterWrap"></div>
    </div>

    <div class="add-panel">
      <div class="type-toggle">
        <div class="type-btn active-plan" id="p-typeWant" onclick="setPlanType('want')">◉ Want</div>
        <div class="type-btn" id="p-typeNeed" onclick="setPlanType('need')">◎ Need</div>
      </div>
      <div class="input-row">
        <input type="text" id="p-name" placeholder="e.g. Exhaust, Rent..." />
        <div class="amt-wrap"><span>$</span><input type="number" id="p-amt" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div>
        <button class="add-btn plan-mode" onclick="addPlanEntry()">+</button>
      </div>
    </div>

    <div class="scroll-list" id="planList"></div>
  </div>

</div>
<script>
  const KEY = 'bp_v2';
  let state = { ledger: [], plan: [] };
  let ledgerType = 'deposit';
  let planType = 'want';

  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function load() { try { const r = localStorage.getItem(KEY); if (r) state = JSON.parse(r); } catch(e) {} }
  function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function getRealBalance() { return state.ledger.reduce((s,e) => e.type === 'deposit' ? s+e.amt : s-e.amt, 0); }

  function switchScreen(name) {
    ['ledger','plan'].forEach(s => {
      document.getElementById('screen-'+s).classList.toggle('active', s === name);
      document.getElementById('nav-'+s).className = 'nav-btn' + (s === name ? ' active-'+s : '');
    });
    if (name === 'plan') renderPlan();
  }

  function setLedgerType(type) {
    ledgerType = type;
    document.getElementById('l-typeDeposit').className = 'type-btn' + (type === 'deposit' ? ' active-deposit' : '');
    document.getElementById('l-typeExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  }

  function addLedgerEntry() {
    const name = document.getElementById('l-name').value.trim() || (ledgerType === 'deposit' ? 'Deposit' : 'Expense');
    const amt = parseFloat(document.getElementById('l-amt').value);
    if (isNaN(amt) || amt <= 0) { document.getElementById('l-amt').focus(); return; }
    state.ledger.unshift({ id: Date.now(), type: ledgerType, name, amt, ts: Date.now() });
    document.getElementById('l-name').value = '';
    document.getElementById('l-amt').value = '';
    save(); renderLedger();
  }

  function removeLedgerEntry(id) { state.ledger = state.ledger.filter(e => e.id !== id); save(); renderLedger(); }

  function setPlanType(type) {
    planType = type;
    document.getElementById('p-typeWant').className = 'type-btn' + (type === 'want' ? ' active-plan' : '');
    document.getElementById('p-typeNeed').className = 'type-btn' + (type === 'need' ? ' active-plan' : '');
  }

  function addPlanEntry() {
    const name = document.getElementById('p-name').value.trim() || (planType === 'want' ? 'Want' : 'Need');
    const amt = parseFloat(document.getElementById('p-amt').value);
    if (isNaN(amt) || amt <= 0) { document.getElementById('p-amt').focus(); return; }
    state.plan.unshift({ id: Date.now(), type: planType, name, amt });
    document.getElementById('p-name').value = '';
    document.getElementById('p-amt').value = '';
    save(); renderPlan();
  }

  function removePlanEntry(id) { state.plan = state.plan.filter(e => e.id !== id); save(); renderPlan(); }

  function clearPlan() {
    if (!state.plan.length) return;
    if (confirm('Clear all planned expenses?')) { state.plan = []; save(); renderPlan(); }
  }

  function renderLedger() {
    const balance = getRealBalance();
    const balEl = document.getElementById('ledgerBalance');
    balEl.textContent = fmt(balance);
    balEl.className = 'balance-amount ' + (balance > 0 ? 'pos' : balance < 0 ? 'neg' : 'zero');
    const deps = state.ledger.filter(e => e.type==='deposit').reduce((s,e)=>s+e.amt,0);
    const exps = state.ledger.filter(e => e.type==='expense').reduce((s,e)=>s+e.amt,0);
    document.getElementById('ledgerSub').textContent = state.ledger.length ? `+${fmt(deps)} in  ·  −${fmt(exps)} out` : 'no transactions yet';
    const list = document.getElementById('ledgerList');
    list.innerHTML = '';
    if (!state.ledger.length) { list.innerHTML = '<div class="empty-state">add a deposit to initialize<br>your balance tracker</div>'; return; }
    const chrono = [...state.ledger].reverse();
    const bals = {}; let running = 0;
    chrono.forEach(e => { running += e.type==='deposit' ? e.amt : -e.amt; bals[e.id] = running; });
    groupByDay(state.ledger).forEach(([day, entries]) => {
      const g = document.createElement('div'); g.className = 'day-group';
      const lbl = document.createElement('div'); lbl.className = 'day-label'; lbl.textContent = '// ' + day;
      g.appendChild(lbl);
      entries.forEach(e => {
        const isD = e.type === 'deposit';
        const div = document.createElement('div'); div.className = 'entry';
        div.innerHTML = `
          <div class="entry-icon ${isD ? 'icon-deposit' : 'icon-expense'}">${isD ? '▲' : '▼'}</div>
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            <div class="entry-meta">${formatTime(e.ts)}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amt ${isD ? 'amt-deposit' : 'amt-expense'}">${isD ? '+' : '−'}${fmt(e.amt)}</div>
            <div class="entry-bal ${bals[e.id] < 0 ? 'neg' : ''}">→ ${bals[e.id]<0?'−':''}${fmt(bals[e.id])}</div>
          </div>
          <button class="del-btn" onclick="removeLedgerEntry(${e.id})">×</button>`;
        g.appendChild(div);
      });
      list.appendChild(g);
    });
  }

  function renderPlan() {
    const real = getRealBalance();
    const balEl = document.getElementById('planRealBalance');
    balEl.textContent = fmt(real);
    balEl.className = 'balance-amount ' + (real > 0 ? 'pos' : real < 0 ? 'neg' : 'zero');
    const list = document.getElementById('planList');
    list.innerHTML = '';
    const totalPlanned = state.plan.reduce((s,e) => s+e.amt, 0);
    const afterAll = real - totalPlanned;
    const wrap = document.getElementById('planAfterWrap');
    wrap.innerHTML = state.plan.length
      ? `<div class="plan-after ${afterAll>=0?'pos':'neg'}">after all planned: ${afterAll<0?'−':''}${fmt(afterAll)}</div>`
      : '';
    if (!state.plan.length) { list.innerHTML = '<div class="empty-state">simulate future expenses here<br>nothing here affects your real balance</div>'; return; }
    const needs = state.plan.filter(e => e.type==='need');
    const wants = state.plan.filter(e => e.type==='want');
    let running = real;
    function renderGroup(items, label) {
      if (!items.length) return;
      const g = document.createElement('div'); g.className = 'day-group';
      const lbl = document.createElement('div'); lbl.className = 'day-label'; lbl.textContent = '⬡ ' + label;
      g.appendChild(lbl);
      items.forEach(e => {
        running -= e.amt;
        const isNeg = running < 0;
        const div = document.createElement('div'); div.className = 'entry planned';
        div.innerHTML = `
          <div class="entry-icon icon-plan">◎</div>
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            <div class="entry-meta">${e.type}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amt amt-plan">−${fmt(e.amt)}</div>
            <div class="entry-bal ${isNeg ? 'neg' : ''}">→ ${isNeg?'−':''}${fmt(running)}</div>
          </div>
          <button class="del-btn" onclick="removePlanEntry(${e.id})">×</button>`;
        g.appendChild(div);
      });
      list.appendChild(g);
    }
    renderGroup(needs, 'Needs');
    renderGroup(wants, 'Wants');
  }

  function groupByDay(entries) {
    const map = new Map();
    entries.forEach(e => { const d = formatDate(e.ts); if (!map.has(d)) map.set(d,[]); map.get(d).push(e); });
    return [...map.entries()];
  }
  function formatDate(ts) {
    const d = new Date(ts), t = new Date(), y = new Date();
    y.setDate(y.getDate()-1);
    if (d.toDateString()===t.toDateString()) return 'Today';
    if (d.toDateString()===y.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }
  function formatTime(ts) { return new Date(ts).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); }
  function resetLedger() { if (confirm('Reset entire account history?')) { state.ledger=[]; save(); renderLedger(); } }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    document.getElementById('screen-ledger').classList.contains('active') ? addLedgerEntry() : addPlanEntry();
  });

  load(); renderLedger();
</script>
</body>
</html>
