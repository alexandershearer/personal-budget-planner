<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Budget" />
<meta name="theme-color" content="#f5f0e8" />
<title>Budget Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5f0e8;
    --surface: #faf7f2;
    --surface2: #ede8de;
    --border: rgba(120,100,70,0.15);
    --border2: rgba(120,100,70,0.28);
    --text: #2c2416;
    --text2: #7a6a52;
    --text3: #a89880;
    --accent: #8a6e3e;
    --accent-dim: rgba(138,110,62,0.1);
    --danger: #b84040;
    --danger-dim: rgba(184,64,64,0.08);
    --good: #3d7a52;
    --good-dim: rgba(61,122,82,0.08);
    --plan: #6b5fa0;
    --plan-dim: rgba(107,95,160,0.08);
    --plan-border: rgba(107,95,160,0.25);
    --warn: #c47a1a;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }

  /* ── Nav ── */
  .nav { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border2); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 13px 8px; text-align: center; font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav-btn.active-ledger { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-btn.active-plan { color: var(--plan); border-bottom-color: var(--plan); }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── Balance header (shared style) ── */
  .balance-header { padding: calc(var(--safe-top) + 16px) 20px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border2); flex-shrink: 0; text-align: center; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-label { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
  .reset-btn { font-family: var(--mono); font-size: 11px; color: var(--text3); background: none; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  .balance-amount { font-family: var(--mono); font-size: 48px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px; transition: color 0.2s; }
  .balance-amount.pos { color: var(--text); }
  .balance-amount.neg { color: var(--danger); }
  .balance-amount.zero { color: var(--text3); }
  .balance-sub { font-family: var(--mono); font-size: 12px; color: var(--text3); }

  /* Plan header extras */
  .plan-after { font-family: var(--mono); font-size: 13px; margin-top: 10px; padding: 8px 14px; border-radius: var(--radius-sm); display: inline-block; }
  .plan-after.pos { background: var(--good-dim); color: var(--good); }
  .plan-after.neg { background: var(--danger-dim); color: var(--danger); }

  /* ── Add entry form ── */
  .add-panel { background: var(--surface); border-bottom: 0.5px solid var(--border2); padding: 12px 16px; flex-shrink: 0; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .type-btn { padding: 8px; border-radius: var(--radius-sm); font-size: 13px; font-family: var(--mono); cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text3); text-align: center; transition: all 0.15s; }
  .type-btn.active-deposit { background: var(--good-dim); border-color: rgba(61,122,82,0.3); color: var(--good); font-weight: 500; }
  .type-btn.active-expense { background: var(--danger-dim); border-color: rgba(184,64,64,0.25); color: var(--danger); font-weight: 500; }
  .type-btn.active-plan { background: var(--plan-dim); border-color: var(--plan-border); color: var(--plan); font-weight: 500; }
  .input-row { display: flex; gap: 8px; align-items: stretch; }
  .input-row input[type=text] { flex: 1; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; font-family: var(--sans); color: var(--text); outline: none; -webkit-appearance: none; }
  .input-row input[type=text]:focus { border-color: var(--accent); }
  .input-row input[type=text]::placeholder { color: var(--text3); }
  .amt-wrap { position: relative; }
  .amt-wrap span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 14px; color: var(--text3); pointer-events: none; }
  .amt-wrap input[type=number] { width: 100px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 10px 10px 22px; font-size: 14px; font-family: var(--mono); color: var(--text); outline: none; -webkit-appearance: none; appearance: none; }
  .amt-wrap input[type=number]:focus { border-color: var(--accent); }
  .add-btn { padding: 10px 16px; border-radius: var(--radius-sm); font-size: 20px; cursor: pointer; border: none; background: var(--accent); color: #faf7f2; flex-shrink: 0; transition: all 0.15s; line-height: 1; }
  .add-btn:active { transform: scale(0.95); }

  /* ── Ledger / Plan list ── */
  .scroll-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px calc(var(--safe-bottom) + 16px); background: var(--bg); }
  .scroll-list::-webkit-scrollbar { width: 0; }
  .day-group { margin-top: 14px; }
  .day-label { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; padding: 0 2px; }
  .entry { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
  .entry.planned { border-style: dashed; border-color: var(--plan-border); background: var(--plan-dim); }
  .entry-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; font-family: var(--mono); }
  .icon-deposit { background: var(--good-dim); color: var(--good); }
  .icon-expense { background: var(--danger-dim); color: var(--danger); }
  .icon-plan { background: var(--plan-dim); color: var(--plan); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amt { font-family: var(--mono); font-size: 15px; font-weight: 500; }
  .amt-deposit { color: var(--good); }
  .amt-expense { color: var(--danger); }
  .amt-plan { color: var(--plan); }
  .entry-bal { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; }
  .del-btn:active { color: var(--danger); }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); font-family: var(--mono); font-size: 13px; line-height: 2; }

  /* Plan screen clear btn */
  .clear-plan-btn { font-family: var(--mono); font-size: 11px; color: var(--plan); background: var(--plan-dim); border: 0.5px solid var(--plan-border); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn active-ledger" id="nav-ledger" onclick="switchScreen('ledger')">ACCOUNT</button>
    <button class="nav-btn" id="nav-plan" onclick="switchScreen('plan')">✦ PLAN</button>
  </div>

  <!-- ══ LEDGER SCREEN ══ -->
  <div class="screen active" id="screen-ledger">
    <div class="balance-header">
      <div class="header-row">
        <span class="header-label">balance</span>
        <button class="reset-btn" onclick="resetLedger()">reset</button>
      </div>
      <div class="balance-amount" id="ledgerBalance">$0.00</div>
      <div class="balance-sub" id="ledgerSub">no transactions yet</div>
    </div>

    <div class="add-panel">
      <div class="type-toggle">
        <div class="type-btn active-deposit" id="l-typeDeposit" onclick="setLedgerType('deposit')">＋ Deposit</div>
        <div class="type-btn" id="l-typeExpense" onclick="setLedgerType('expense')">－ Expense</div>
      </div>
      <div class="input-row">
        <input type="text" id="l-name" placeholder="Description..." />
        <div class="amt-wrap"><span>$</span><input type="number" id="l-amt" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div>
        <button class="add-btn" onclick="addLedgerEntry()">+</button>
      </div>
    </div>

    <div class="scroll-list" id="ledgerList"></div>
  </div>

  <!-- ══ PLAN SCREEN ══ -->
  <div class="screen" id="screen-plan">
    <div class="balance-header">
      <div class="header-row">
        <span class="header-label">planning</span>
        <button class="clear-plan-btn" onclick="clearPlan()">clear all</button>
      </div>
      <div class="balance-sub" style="margin-bottom:4px;">starting from real balance</div>
      <div class="balance-amount pos" id="planRealBalance">$0.00</div>
      <div id="planAfterWrap"></div>
    </div>

    <div class="add-panel">
      <div class="type-toggle">
        <div class="type-btn active-plan" id="p-typeWant" onclick="setPlanType('want')">◉ Want</div>
        <div class="type-btn" id="p-typeNeed" onclick="setPlanType('need')">◎ Need</div>
      </div>
      <div class="input-row">
        <input type="text" id="p-name" placeholder="e.g. New exhaust, Rent..." />
        <div class="amt-wrap"><span>$</span><input type="number" id="p-amt" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div>
        <button class="add-btn" onclick="addPlanEntry()" style="background:var(--plan);">+</button>
      </div>
    </div>

    <div class="scroll-list" id="planList"></div>
  </div>

</div>
<script>
  const KEY = 'bp_v2';
  let state = { ledger: [], plan: [] };
  let ledgerType = 'deposit';
  let planType = 'want';

  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function load() { try { const r = localStorage.getItem(KEY); if (r) state = JSON.parse(r); } catch(e) {} }

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function getRealBalance() {
    return state.ledger.reduce((s, e) => e.type === 'deposit' ? s + e.amt : s - e.amt, 0);
  }

  function switchScreen(name) {
    ['ledger','plan'].forEach(s => {
      document.getElementById('screen-'+s).classList.toggle('active', s === name);
      const btn = document.getElementById('nav-'+s);
      btn.className = 'nav-btn' + (s === name ? ' active-'+s : '');
    });
    if (name === 'plan') renderPlan();
  }

  /* ── Ledger type toggle ── */
  function setLedgerType(type) {
    ledgerType = type;
    document.getElementById('l-typeDeposit').className = 'type-btn' + (type === 'deposit' ? ' active-deposit' : '');
    document.getElementById('l-typeExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  }

  /* ── Add ledger entry ── */
  function addLedgerEntry() {
    const name = document.getElementById('l-name').value.trim() || (ledgerType === 'deposit' ? 'Deposit' : 'Expense');
    const amt = parseFloat(document.getElementById('l-amt').value);
    if (isNaN(amt) || amt <= 0) { document.getElementById('l-amt').focus(); return; }
    state.ledger.unshift({ id: Date.now(), type: ledgerType, name, amt, ts: Date.now() });
    document.getElementById('l-name').value = '';
    document.getElementById('l-amt').value = '';
    save();
    renderLedger();
  }

  function removeLedgerEntry(id) {
    state.ledger = state.ledger.filter(e => e.id !== id);
    save();
    renderLedger();
  }

  /* ── Plan type toggle ── */
  function setPlanType(type) {
    planType = type;
    document.getElementById('p-typeWant').className = 'type-btn' + (type === 'want' ? ' active-plan' : '');
    document.getElementById('p-typeNeed').className = 'type-btn' + (type === 'need' ? ' active-plan' : '');
  }

  /* ── Add plan entry ── */
  function addPlanEntry() {
    const name = document.getElementById('p-name').value.trim() || (planType === 'want' ? 'Want' : 'Need');
    const amt = parseFloat(document.getElementById('p-amt').value);
    if (isNaN(amt) || amt <= 0) { document.getElementById('p-amt').focus(); return; }
    state.plan.unshift({ id: Date.now(), type: planType, name, amt });
    document.getElementById('p-name').value = '';
    document.getElementById('p-amt').value = '';
    save();
    renderPlan();
  }

  function removePlanEntry(id) {
    state.plan = state.plan.filter(e => e.id !== id);
    save();
    renderPlan();
  }

  function clearPlan() {
    if (!state.plan.length) return;
    if (confirm('Clear all planned expenses?')) { state.plan = []; save(); renderPlan(); }
  }

  /* ── Render ledger ── */
  function renderLedger() {
    const balance = getRealBalance();
    const balEl = document.getElementById('ledgerBalance');
    balEl.textContent = fmt(balance);
    balEl.className = 'balance-amount ' + (balance > 0 ? 'pos' : balance < 0 ? 'neg' : 'zero');

    const deps = state.ledger.filter(e => e.type === 'deposit').reduce((s,e) => s+e.amt, 0);
    const exps = state.ledger.filter(e => e.type === 'expense').reduce((s,e) => s+e.amt, 0);
    document.getElementById('ledgerSub').textContent = state.ledger.length
      ? `+${fmt(deps)} in  ·  −${fmt(exps)} out`
      : 'no transactions yet';

    const list = document.getElementById('ledgerList');
    list.innerHTML = '';
    if (!state.ledger.length) {
      list.innerHTML = '<div class="empty-state">Add a deposit to get started.<br>Your balance updates in real time.</div>';
      return;
    }

    // Compute running balances chronologically
    const chrono = [...state.ledger].reverse();
    const bals = {};
    let running = 0;
    chrono.forEach(e => { running += e.type === 'deposit' ? e.amt : -e.amt; bals[e.id] = running; });

    // Group by date
    const groups = groupByDay(state.ledger);
    groups.forEach(([day, entries]) => {
      const g = document.createElement('div'); g.className = 'day-group';
      const lbl = document.createElement('div'); lbl.className = 'day-label'; lbl.textContent = day;
      g.appendChild(lbl);
      entries.forEach(e => {
        const isDeposit = e.type === 'deposit';
        const div = document.createElement('div'); div.className = 'entry';
        div.innerHTML = `
          <div class="entry-icon ${isDeposit ? 'icon-deposit' : 'icon-expense'}">${isDeposit ? '↑' : '↓'}</div>
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            <div class="entry-meta">${formatTime(e.ts)}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amt ${isDeposit ? 'amt-deposit' : 'amt-expense'}">${isDeposit ? '+' : '−'}${fmt(e.amt)}</div>
            <div class="entry-bal">→ ${fmt(bals[e.id])}</div>
          </div>
          <button class="del-btn" onclick="removeLedgerEntry(${e.id})">×</button>`;
        g.appendChild(div);
      });
      list.appendChild(g);
    });
  }

  /* ── Render plan ── */
  function renderPlan() {
    const real = getRealBalance();
    document.getElementById('planRealBalance').textContent = fmt(real);

    const list = document.getElementById('planList');
    list.innerHTML = '';

    const totalPlanned = state.plan.reduce((s,e) => s + e.amt, 0);
    const afterAll = real - totalPlanned;

    const wrap = document.getElementById('planAfterWrap');
    if (state.plan.length) {
      wrap.innerHTML = `<div class="plan-after ${afterAll >= 0 ? 'pos' : 'neg'}">
        after all planned: ${afterAll < 0 ? '−' : ''}${fmt(afterAll)}
      </div>`;
    } else {
      wrap.innerHTML = '';
    }

    if (!state.plan.length) {
      list.innerHTML = '<div class="empty-state">Add future expenses here to see<br>how they affect your balance.<br><br>Nothing here changes your real account.</div>';
      return;
    }

    // Show needs first, then wants
    const needs = state.plan.filter(e => e.type === 'need');
    const wants = state.plan.filter(e => e.type === 'want');

    let running = real;

    function renderGroup(items, label) {
      if (!items.length) return;
      const g = document.createElement('div'); g.className = 'day-group';
      const lbl = document.createElement('div'); lbl.className = 'day-label'; lbl.textContent = label;
      g.appendChild(lbl);
      items.forEach(e => {
        running -= e.amt;
        const div = document.createElement('div'); div.className = 'entry planned';
        div.innerHTML = `
          <div class="entry-icon icon-plan">◎</div>
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            <div class="entry-meta">${e.type === 'want' ? 'want' : 'need'}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amt amt-plan">−${fmt(e.amt)}</div>
            <div class="entry-bal ${running < 0 ? 'style="color:var(--danger)"' : ''}">→ ${running < 0 ? '−' : ''}${fmt(running)}</div>
          </div>
          <button class="del-btn" onclick="removePlanEntry(${e.id})">×</button>`;
        g.appendChild(div);
      });
      list.appendChild(g);
    }

    renderGroup(needs, 'Needs');
    renderGroup(wants, 'Wants');
  }

  /* ── Helpers ── */
  function groupByDay(entries) {
    const map = new Map();
    entries.forEach(e => {
      const day = formatDate(e.ts);
      if (!map.has(day)) map.set(day, []);
      map.get(day).push(e);
    });
    return [...map.entries()];
  }

  function formatDate(ts) {
    const d = new Date(ts), today = new Date(), yest = new Date();
    yest.setDate(yest.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yest.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function resetLedger() {
    if (confirm('Reset your entire account history?')) { state.ledger = []; save(); renderLedger(); }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('screen-ledger').classList.contains('active')) addLedgerEntry();
    else addPlanEntry();
  });

  load(); renderLedger();
</script>
</body>
</html>
